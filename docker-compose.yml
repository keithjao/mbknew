services:
  postgres:
    image: postgres:16
    container_name: mbk-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: mbk_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - mbk-postgres-data:/var/lib/postgresql/data

volumes:
  mbk-postgres-data:

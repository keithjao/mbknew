<div class="event-operations">
  <div class="tabs-header">
    <button
      class="tab-btn"
      [class.active]="activeTab === 'events'"
      (click)="activeTab = 'events'"
    >
      📅 Events
    </button>
    <button
      class="tab-btn"
      [class.active]="activeTab === 'templates'"
      (click)="activeTab = 'templates'"
    >
      📋 Templates
    </button>
  </div>

  <div class="tabs-content">
    <app-event-management *ngIf="activeTab === 'events'"></app-event-management>
    <app-template-management *ngIf="activeTab === 'templates'"></app-template-management>
  </div>
</div>
